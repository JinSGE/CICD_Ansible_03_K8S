---
- name: Install Common System Dependencies
  hosts: all
  become: true
  tasks:
    - name: Install required packages
      dnf:
        name:
          - git
          - python3
          - python3-pip
          - podman
          - ansible
          - firewalld
          - haproxy
          - gcc
          - python3-devel
          - postgresql-devel
          - postgresql
          - curl
          - nmap-ncat
          - jq
          - make
          - iproute
          - iputils
          - procps-ng
        state: present

    - name: Ensure Firewalld is enabled and running
      service:
        name: firewalld
        state: started
        enabled: yes
