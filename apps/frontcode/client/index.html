<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI + API 기반 통합 대시보드</title>
  <style>
    :root {
      --bg-color: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-sub: #64748b;
      --border: #e2e8f0;
      --accent: #8b5cf6;
      --accent-hover: #7c3aed;
      --shadow: rgba(0, 0, 0, 0.05);
      --chat-user-bg: #8b5cf6;
      --chat-user-text: #fff;

      --content-w: 980px;
      --chat-height: 380px;
    }

    body.dark-mode {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --text-main: #f1f5f9;
      --text-sub: #94a3b8;
      --border: #334155;
      --accent: #a78bfa;
      --accent-hover: #8b5cf6;
      --shadow: rgba(0, 0, 0, 0.3);
      --chat-user-bg: #6366f1;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      transition: background .3s, color .3s;
    }

    html,
    body {
      height: 100%;
      background: var(--bg-color);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      overflow: hidden;
    }

    /* --- Login View (✅ 반쪽 화면에서도 main처럼 정상적으로) --- */
    #loginView {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f1f5f9;
      z-index: 9999;
      padding: 24px;
      /* ✅ 화면 줄여도 카드가 가장자리에 붙지 않게 */
    }

    .login-shell {
      width: min(980px, 100%);
      /* ✅ 100%로 늘어나지 않게 */
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      background: white;
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, .1);
      overflow: hidden;
    }

    .login-hero {
      padding: 50px;
      color: #fff;
      background: linear-gradient(135deg, #4338ca 0%, #6d28d9 50%, #7c3aed 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .login-panel {
      padding: 50px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow-y: auto;
      max-height: calc(100vh - 48px);
      /* ✅ padding 24*2 고려 */
    }

    .login-title {
      font-size: 22px;
      font-weight: 900;
      color: #0f172a;
      margin-bottom: 6px;
    }

    .login-desc {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 18px;
    }

    .login-input {
      width: 100%;
      padding: 14px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      outline: none;
      font-size: 14px;
      margin-bottom: 15px;
    }

    .login-input:focus {
      border-color: #8b5cf6;
      background: #fcfaff;
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #8b5cf6;
      color: #fff;
      font-weight: 900;
      cursor: pointer;
      margin-bottom: 10px;
      font-size: 15px;
    }

    .btn-ghost {
      width: 100%;
      padding: 14px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      background: #fff;
      color: #475569;
      font-weight: 900;
      cursor: pointer;
      font-size: 15px;
    }

    .login-links {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
      font-size: 13px;
    }

    .link-btn {
      background: none;
      border: none;
      color: #8b5cf6;
      font-weight: 900;
      cursor: pointer;
      font-size: 13px;
    }

    .link-btn:hover {
      text-decoration: underline;
      color: #7c3aed;
    }

    .hidden {
      display: none !important;
    }

    #authExtra {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #f1f5f9;
    }

    /* --- Dashboard Layout --- */
    #dashboardView {
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .wrap {
      width: min(var(--content-w), calc(100% - 40px));
      margin: 0 auto;
    }

    .page {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .page>.wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .main-area {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 18px 0 0 0;
      gap: 14px;
    }

    .bottom-area {
      margin-top: auto;
      padding: 8px 0 18px 0;
      flex-shrink: 0;
    }

    /* ========================= TOP BAR ========================= */
    #toolbar {
      height: 64px;
      margin-top: 16px;
      background: rgba(255, 255, 255, .88);
      backdrop-filter: blur(14px);
      border: 1px solid var(--border);
      border-radius: 999px;
      box-shadow: 0 6px 24px var(--shadow);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      gap: 12px;
      flex-shrink: 0;
    }

    body.dark-mode #toolbar {
      background: rgba(30, 41, 59, .88);
    }

    .tb-left {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
    }

    .tb-logo {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: rgba(139, 92, 246, .12);
      color: var(--accent);
      font-weight: 900;
    }

    .tb-chip {
      font-size: 12px;
      background: #f1f5f9;
      color: var(--text-sub);
      padding: 4px 12px;
      border-radius: 999px;
      font-weight: 900;
    }

    body.dark-mode .tb-chip {
      background: #0b1220;
      border: 1px solid #223047;
    }

    /* ✅ Weather/Energy/FX/Time 인디케이터 영역 완전 제거 */


    .tb-center {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
      flex: 1;
      min-width: 0;
    }

    .tb-time {
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(241, 245, 249, .9);
      color: var(--text-sub);
      font-weight: 900;
      white-space: nowrap;
    }

    body.dark-mode .tb-time {
      background: rgba(11, 18, 32, .9);
      border-color: #223047;
      color: #cbd5e1;
    }

    .tb-right {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: flex-end;
    }

    .tb-btn {
      padding: 8px 14px;
      border: 1px solid var(--border);
      background: var(--bg-color);
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
      color: var(--text-sub);
      transition: all .2s ease;
      white-space: nowrap;
    }

    .tb-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ========================= CONTENT ========================= */
    .quote-card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 24px 34px;
      box-shadow: 0 4px 20px var(--shadow);
      text-align: center;
      border: 1px solid var(--border);
    }

    .quote-text {
      font-size: 18px;
      font-weight: 700;
    }

    .quote-author {
      margin-top: 8px;
      color: var(--text-sub);
      font-weight: 700;
    }

    .input-wrapper {
      position: relative;
      width: 100%;
    }

    .question-input {
      width: 100%;
      padding: 20px 60px 20px 26px;
      font-size: 16px;
      border: 2px solid var(--border);
      border-radius: 999px;
      background: var(--card-bg);
      color: var(--text-main);
      outline: none;
      box-shadow: 0 4px 15px var(--shadow);
    }

    .send-button {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 48px;
      height: 48px;
      border: none;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent) 0%, #6366f1 100%);
      color: #fff;
      cursor: pointer;
    }


    .example-questions-spacer {
      height: 48px;
      margin-top: 10px;
      margin-bottom: 4px;
    }

    .example-questions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 10px;
      margin-bottom: 4px;
    }

    .example-btn {
      padding: 8px 18px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 13px;
      font-weight: 900;
      color: var(--text-sub);
      cursor: pointer;
      box-shadow: 0 2px 5px rgba(0, 0, 0, .03);
      transition: all .2s;
    }

    .example-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .chat-topbar {
      display: none;
      justify-content: flex-end;
      margin-top: -6px;
      margin-bottom: -10px;
    }

    .chat-topbar.active {
      display: flex;
    }


    .chat-bottombar {
      display: none;
      justify-content: flex-end;
      margin-top: 12px;
    }

    .chat-bottombar.active {
      display: flex;
    }

    .clear-chat-out {
      padding: 7px 12px;
      background: rgba(241, 245, 249, .9);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      color: var(--text-sub);
      cursor: pointer;
      transition: all .2s;
    }

    .clear-chat-out:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(139, 92, 246, .08);
    }

    body.dark-mode .clear-chat-out {
      background: rgba(30, 41, 59, .88);
      border-color: #334155;
      color: #cbd5e1;
    }

    .response-area {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 16px 18px;
      box-shadow: 0 4px 20px var(--shadow);
      border: 1px solid var(--border);
      display: none;
      flex-direction: column;
      gap: 10px;
      margin-top: 0px;
      flex: 1;
      min-height: 0;

      overflow: hidden;
    }

    .response-area.active {
      display: flex;
    }

    .chat-history {
      overflow-y: auto;
      overflow-x: hidden;
      padding-right: 6px;
      flex: 1;
      min-height: 0;
    }

    .chat-bubble {
      max-width: 80%;
      border-radius: 20px;
      padding: 14px 18px;
      border: 1px solid var(--border);
      background: var(--bg-color);
      line-height: 1.5;
      font-size: 15px;
      white-space: pre-wrap;
    }

    .chat-msg {
      display: flex;
      margin: 10px 0;
    }

    .chat-msg.user {
      justify-content: flex-end;
    }

    .chat-msg.user .chat-bubble {
      background: var(--chat-user-bg);
      border-color: var(--chat-user-bg);
      color: var(--chat-user-text);
    }

    /* ========================= BOTTOM BLOCKS ========================= */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    .info-card {
      background: rgba(255, 255, 255, .8);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 14px 16px;
      border: 1px solid rgba(255, 255, 255, .6);
      box-shadow: 0 8px 32px rgba(0, 0, 0, .05);
      text-align: left;
      min-height: 92px;
    }

    body.dark-mode .info-card {
      background: rgba(30, 41, 59, .85);
      border-color: rgba(255, 255, 255, .1);
    }

    .info-title {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      font-weight: 900;
      color: var(--text-sub);
      margin-bottom: 6px;
    }

    .badge {
      font-size: 11px;
      background: rgba(139, 92, 246, .1);
      color: var(--accent);
      padding: 4px 8px;
      border-radius: 6px;
      font-weight: 900;
    }

    .info-value {
      font-size: 20px;
      font-weight: 900;
      color: var(--text-main);
      margin-bottom: 4px;
    }

    .info-sub {
      font-size: 12px;
      color: var(--text-sub);
      font-weight: 900;
    }

    .hint-banner {
      margin-top: 10px;
      padding: 10px 16px;
      border-radius: 14px;
      border: 1px dashed var(--border);
      color: var(--text-sub);
      background: rgba(255, 255, 255, .65);
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 20px var(--shadow);
      font-size: 13px;
      font-weight: 900;
      display: none;
    }

    .hint-banner strong {
      color: var(--text-main);
    }

    #guestHeader {
      height: 60px;
      margin-top: 16px;
      display: flex;
      justify-content: flex-end;
    }

    .gbtn {
      padding: 8px 16px;
      background: rgba(255, 255, 255, .9);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0, 0, 0, .05);
    }

    body.dark-mode .gbtn {
      background: rgba(30, 41, 59, .88);
      color: var(--text-main);
    }

    /* ✅ 반쪽 화면(대략 700~900px)에서도 2단 유지 → 760px 이하에서만 1단 */
    @media (max-width: 900px) {
      .info-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 760px) {
      .login-shell {
        grid-template-columns: 1fr;
      }

      .login-hero {
        display: none;
      }

      #loginView {
        padding: 16px;
      }

      .login-panel {
        padding: 34px 22px;
        max-height: calc(100vh - 32px);
      }
    }
  </style>
</head>

<body>

  <div id="loginView">
    <div class="login-shell">
      <div class="login-hero">
        <h1>AI + API 기반<br>통합 대시보드</h1>
        <p>Kubernetes 기반 인프라 관제 및 실시간<br>날씨, 강수, 미세먼지 정보를 확인하세요.</p>
      </div>

      <div class="login-panel">
        <div class="login-title">환영합니다! 👋</div>
        <div class="login-desc">로그인하여 대시보드에 접속하세요.</div>

        <label style="font-size:13px; font-weight:900;">아이디</label>
        <input class="login-input login-trigger" id="loginUser" placeholder="아이디">

        <label style="font-size:13px; font-weight:900;">비밀번호</label>
        <input class="login-input login-trigger" id="loginPass" type="password" placeholder="비밀번호">

        <button class="btn-primary" id="btnLogin">로그인</button>
        <button class="btn-ghost" id="btnGuest">비회원 입장</button>

        <div class="login-links">
          <button class="link-btn" id="btnShowSignup">회원가입</button>
          <button class="link-btn" id="btnShowReset">비밀번호 찾기</button>
        </div>

        <div id="authExtra" class="hidden">
          <div id="signupPane" class="hidden">
            <div style="font-weight:900; margin-bottom:10px;">회원가입</div>
            <input class="login-input" id="suUser" placeholder="새 아이디">
            <input class="login-input" id="suPass" type="password" placeholder="새 비밀번호">
            <button class="btn-primary" id="btnDoSignup" style="margin-top:5px;">가입하기</button>
            <button class="link-btn" onclick="closeExtra()" style="width:100%; margin-top:5px;">닫기</button>
          </div>
          <div id="resetPane" class="hidden">
            <div style="font-weight:900; margin-bottom:10px;">비밀번호 재설정</div>
            <input class="login-input" id="rpUser" placeholder="기존 아이디">
            <input class="login-input" id="rpNewPass" type="password" placeholder="새 비밀번호">
            <button class="btn-primary" id="btnDoReset" style="margin-top:5px;">변경하기</button>
            <button class="link-btn" onclick="closeExtra()" style="width:100%; margin-top:5px;">닫기</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="dashboardView" class="hidden">
    <div class="wrap">
      <div id="toolbar" class="hidden">
        <div class="tb-left">
          <div class="tb-logo">A</div>
          <span class="tb-chip" id="tbUserChip">admin</span>
        </div>
        <div class="tb-right">
          <button class="tb-btn" id="tbDarkMode">🌙 다크 모드</button>
          <button class="tb-btn" id="tbLogout">로그아웃</button>
        </div>
      </div>
    </div>

    <div class="wrap">
      <div id="guestHeader" class="hidden">
        <button class="gbtn" id="guestLogout">👈 뒤로가기</button>
      </div>
    </div>

    <div class="wrap">
      <div class="hint-banner" id="hostHint">⚠️ IP로 접속 중입니다. <strong>cafekec.shop</strong> 도메인을 권장합니다.</div>
    </div>

    <div class="page">
      <div class="wrap">
        <div class="main-area">
          <div class="quote-card">
            <div class="quote-text" id="quoteText">Loading...</div>
            <div class="quote-author" id="quoteAuthor"></div>
          </div>

          <div class="main-section">
            <div class="input-wrapper">
              <input type="text" class="question-input" id="questionInput"
                placeholder="질문을 입력하세요 (예: 날씨, 미세먼지, 인프라, 쿠버, 전력 등)" autocomplete="off">
              <button class="send-button" id="sendButton">▲</button>
            </div>
            <div class="example-questions-spacer"></div>
          </div>

          <div class="chat-topbar" id="chatTopbar"></div>

          <div class="response-area" id="responseArea">
            <div class="chat-history" id="chatHistory"></div>


            <div class="chat-bottombar" id="chatBottomBar">
              <button class="clear-chat-out" id="btnClearChatOuter">대화 초기화</button>
            </div>
          </div>
        </div>
      </div>

      <div class="bottom-area">
        <div class="wrap">
          <div class="info-grid">
            <div class="info-card">
              <div class="info-title">날씨 <span class="badge">기상청 초단기</span></div>
              <div class="info-value" id="weatherValue">—</div>
              <div class="info-sub" id="weatherSub">로딩 중...</div>
            </div>
            <div class="info-card">
              <div class="info-title">강수확률 <span class="badge">기상청 단기</span></div>
              <div class="info-value" id="rainValue">—</div>
              <div class="info-sub" id="rainSub">로딩 중...</div>
            </div>
            <div class="info-card">
              <div class="info-title">미세먼지(PM10) <span class="badge">서울</span></div>
              <div class="info-value" id="pm10Value">—</div>
              <div class="info-sub" id="pm10Sub">로딩 중...</div>
            </div>
            <div class="info-card">
              <div class="info-title">초미세먼지(PM2.5) <span class="badge">서울</span></div>
              <div class="info-value" id="pm25Value">—</div>
              <div class="info-sub" id="pm25Sub">로딩 중...</div>
            </div>
          </div>
        </div>
      </div>
    </div><!-- /page -->
  </div>

  <script>
    const AUTH_KEY = "team2_auth_v1";
    const USERS_KEY = "team2_users_v1";
    const API_BASE = "";

    // ==========================
    // ✅ AI 설정 (여기만 바꾸면 됨)
    // ==========================
    const AI_MODEL = "llama3.1:latest";

    // ✅ 운영 권장: 브라우저는 SAME-ORIGIN 프록시만 호출 (CORS/혼합콘텐츠 방지)
    // - Ingress에서 /api/ai → auth-chat-api(프록시) 로 라우팅되도록 구성
    // - auth-chat-api가 내부에서 Ollama(/api/chat)로 프록시
    const AI_PROXY_ENDPOINT = "/api/ai";

    const WIDGETS = {
      weatherUrl: "/api/weather/ultra",
      dustPm10Url: "/api/dust/seoul/pm10",
      dustPm25Url: "/api/dust/seoul/pm25",
      forecastUrl: "/api/weather/short",
      fxUrl: "https://api.frankfurter.dev/v1/latest",
    };


    // ==========================
    // ✅ RAG 상태 표시 (선택)
    // ==========================
    async function updateRagChip() {
      const ragChip = document.getElementById("ragChip");
      const aiRouteChip = document.getElementById("aiRouteChip");
      if (!ragChip || !aiRouteChip) return;

      // KB(knowledge) 확인
      try {
        const r = await fetch("/api/knowledge");
        if (!r.ok) throw new Error("kb http " + r.status);
        const kb = await r.json();
        const n = Array.isArray(kb) ? kb.length : 0;
        ragChip.textContent = `RAG: ON (KB ${n})`;
      } catch (e) {
        ragChip.textContent = "RAG: — (KB X)";
      }

    function normalizePlaceText(s) {
      return (s || "")
        .toLowerCase()
        .replace(/\s+/g, "")
        // 행정구역 접미어(중간/끝 모두) 정리
        .replace(/(특별자치도|특별자치시|광역시|특별시|자치도|자치시)/g, "")
        .replace(/(도|시|군|구)/g, "");
    }

    function detectLocationFromText(text) {
      const raw = (text || "");
      const lower = raw.toLowerCase();
      const norm = normalizePlaceText(raw);

      // 1) 도시/대표지점(LOCATIONS) 우선 매칭
      for (const loc of LOCATIONS) {
        const hit = (loc.keywords || []).some(k => {
          const kk = String(k).toLowerCase();
          return lower.includes(kk) || norm.includes(normalizePlaceText(kk));
        });
        if (hit) {
          return { ...loc, displayName: loc.name, matchedBy: "city" };
        }
      }

      // 2) “강원도/충북/경남 …” 같은 권역/도 단위 → 대표 도시로 폴백
      for (const r of REGION_FALLBACKS) {
        const hit = (r.keywords || []).some(k => {
          const kk = String(k).toLowerCase();
          return lower.includes(kk) || norm.includes(normalizePlaceText(kk));
        });
        if (hit) {
          const rep = LOCATIONS.find(x => x.name === r.locName) || LOCATIONS[0];
          // 예: "강원도 날씨" → "강원(춘천 기준)"
          return { ...rep, displayName: `${r.label}(${rep.name} 기준)`, matchedBy: "region" };
        }
      }

      // 3) 못 찾으면 기본 서울(단, 안내문에서 표시 가능)
      const def = LOCATIONS[0] || { name: "서울", nx: 60, ny: 127 };
      return { ...def, displayName: `${def.name}(기본값)`, matchedBy: "default" };
    }

    async function loadWeatherAndRain() {
      const { nx, ny } = LOCATIONS[0];

      // ✅ 초단기실황(온도/습도/강수량 RN1) - 운영에서 확인된 정상 경로 우선
      const ultraCandidates = [
        `${API_BASE}/api/weather/ultra?nx=${nx}&ny=${ny}`,
        `${API_BASE}/api/weather/weather/ultra?nx=${nx}&ny=${ny}`,
      ];

      // ✅ 단기예보(강수확률 POP) - 환경별 경로 차이 대비
      const shortCandidates = [
        `${API_BASE}/api/weather/short?nx=${nx}&ny=${ny}`,
        `${API_BASE}/api/weather/weather/short?nx=${nx}&ny=${ny}`,
      ];

      try {
        // -------- 1) ultra fetch --------
        let ultraJson = null;
        let lastErr = null;

        for (const fullUrl of ultraCandidates) {
          try {
            const res = await fetch(fullUrl);
            if (!res.ok) {
              if (res.status === 404) throw new Error(`404 Not Found: ${fullUrl}`);
              throw new Error(`http ${res.status}: ${fullUrl}`);
            }
            ultraJson = await res.json();
            lastErr = null;
            break;
          } catch (e) {
            lastErr = e;
          }
        }
        if (!ultraJson) throw lastErr || new Error("ultra fetch failed");

        const temp = safeNum(ultraJson.temperature_c);
        const reh = safeNum(ultraJson.humidity_pct);
        const rainMm = safeNum(ultraJson.rain_1h_mm);

        // -------- 2) short fetch (POP) --------
        let popPct = null;
        try {
          let shortJson = null;
          for (const fullUrl of shortCandidates) {
            try {
              const res = await fetch(fullUrl);
              if (!res.ok) {
                if (res.status === 404) throw new Error(`404 Not Found: ${fullUrl}`);
                throw new Error(`http ${res.status}: ${fullUrl}`);
              }
              shortJson = await res.json();
              break;
            } catch (e) {
              // try next candidate
            }
          }

          if (shortJson) {
            // 1) { hourly:[{ POP: "30"}] }
            const h0 = shortJson?.hourly?.[0];
            popPct = safeNum(h0?.POP ?? h0?.pop ?? shortJson?.POP ?? shortJson?.pop);

            // 2) { items:[{ category:"POP", fcstValue:"30"}] } 류
            if (popPct === null && Array.isArray(shortJson?.items)) {
              const popItem = shortJson.items.find(it => (it.category || "").toUpperCase() === "POP");
              popPct = safeNum(popItem?.fcstValue ?? popItem?.value);
            }

            // 3) 배열이 바로 오는 타입
            if (popPct === null && Array.isArray(shortJson)) {
              const a0 = shortJson[0];
              popPct = safeNum(a0?.POP ?? a0?.pop);
            }
          }
        } catch (e2) {
          // POP 없이 진행
        }

        // -------- UI 반영 --------
        if (temp !== null) {
          document.getElementById("weatherValue").textContent = `${Math.round(temp)}°C`;
          document.getElementById("weatherSub").textContent = (reh !== null) ? `습도 ${Math.round(reh)}%` : `실시간`;
        } else {
          document.getElementById("weatherValue").textContent = "—";
          document.getElementById("weatherSub").textContent = "데이터 없음";
        }

        // 강수 카드: ✅ 강수확률(POP)만 메인 표기, 부가설명은 강수량(mm)만
        const rainMmText = (rainMm !== null) ? `${rainMm}mm` : "—";

        if (popPct !== null) {
          document.getElementById("rainValue").textContent = `${Math.round(popPct)}%`;
          document.getElementById("rainSub").textContent = `강수량 ${rainMmText}`;
        } else if (rainMm !== null) {
          // POP 못가져오면 확률은 비워두고 강수량만 표시
          document.getElementById("rainValue").textContent = "—";
          document.getElementById("rainSub").textContent = `강수량 ${rainMmText}`;
        } else {
          document.getElementById("rainValue").textContent = "—";
          document.getElementById("rainSub").textContent = "데이터 없음";
        }

      } catch (e) {
        console.error("Weather/Rain Fail:", e);
        document.getElementById("weatherValue").textContent = "N/A";
        document.getElementById("weatherSub").textContent = "연동 실패";
        document.getElementById("rainValue").textContent = "N/A";
        document.getElementById("rainSub").textContent = "연동 실패";
      }
    }

    async function callAI(messages, signal) {
      const payload = { model: AI_MODEL, messages, stream: false };

      // ✅ 단일 경로 고정: same-origin 프록시만 사용
      // - direct 제거(HTTPS 혼합콘텐츠/CORS 방지)
      const attempts = [];
      const res = await fetch(AI_PROXY_ENDPOINT, {
        method: "POST",
        signal,
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      attempts.push({ via: "proxy", status: res.status });

      const raw = await res.text();

      if (!res.ok) {
        const err = new Error(`proxy http ${res.status}`);
        err.attempts = attempts;
        err.raw = raw.slice(0, 300);
        throw err;
      }

      // JSON이 아니라 HTML(<!doctype ...)이 오면 여기서 잡힘
      let data;
      try {
        data = JSON.parse(raw);
      } catch (e) {
        const head = raw.slice(0, 120).replace(/\s+/g, " ");
        const err = new Error(`proxy returned NON-JSON (likely HTML/redirect). head="${head}"`);
        err.attempts = attempts;
        err.raw = raw.slice(0, 600);
        throw err;
      }

      const content =
        data?.message?.content ??
        data?.choices?.[0]?.message?.content ??
        data?.response ??
        null;

      if (!content) {
        const err = new Error("proxy response JSON but missing content");
        err.attempts = attempts;
        err.raw = raw.slice(0, 600);
        throw err;
      }

      window.__lastAiVia = "proxy";
      return { via: "proxy", content, attempts };
    }

            keywords: ["산악", "mountain", "mt", "덴버", "denver", "콜로라도", "colorado", "유타", "utah"],
          },
          {
            labelKR: "태평양(PT)",
            labelEN: "Pacific (PT)",
            tz: "America/Los_Angeles",
            keywords: ["태평양", "pacific", "pt", "la", "los angeles", "로스앤젤레스", "엘에이", "캘리포니아", "california", "샌프란시스코", "san francisco", "시애틀", "seattle"],
          },
        ],
      },
    ];

    const TIME_QUESTION_KEYWORDS = [
      "시간", "몇 시", "지금 몇시", "지금 몇 시", "현재 시간", "현지 시간", "몇시야",
      "time", "what time", "current time", "local time", "now time"
    ];

    function isEnglishText(s) {
      return /^[\x00-\x7F]*$/.test(s || "");
    }

    function isTimeQuestion(text) {
      const lower = (text || "").toLowerCase();
      return TIME_QUESTION_KEYWORDS.some(k => lower.includes(k));
    }

    function getTimePartsInTZ(tz) {
      const now = new Date();
      const dt = new Date(now.toLocaleString("en-US", { timeZone: tz }));

      const yyyy = dt.getFullYear();
      const mm = String(dt.getMonth() + 1).padStart(2, "0");
      const dd = String(dt.getDate()).padStart(2, "0");
      const HH = String(dt.getHours()).padStart(2, "0");
      const MI = String(dt.getMinutes()).padStart(2, "0");
      const SS = String(dt.getSeconds()).padStart(2, "0");

      const dateStr = `${yyyy}-${mm}-${dd}`;
      const timeStr = `${HH}:${MI}:${SS}`;

      const weekdayKR = dt.toLocaleDateString("ko-KR", { weekday: "long" });
      const weekdayEN = dt.toLocaleDateString("en-US", { weekday: "long" });

      return { dateStr, timeStr, weekdayKR, weekdayEN };
    }

    function detectTimeTarget(text) {
      const lower = (text || "").toLowerCase();

      // ✅ 한국 도시명만 있어도 KR(Asia/Seoul)로 처리 (전국 동일 시간대)
      const kr = TIME_COUNTRIES.find(x => x.code === "KR");
      const krOpt = kr?.options?.[0];
      if (krOpt?.keywords?.some(k => lower.includes(String(k).toLowerCase()))) {
        return { country: kr, tz: krOpt.tz, labelKR: "지역", labelEN: "Local", usedOption: true, multi: false };
      }


      for (const c of TIME_COUNTRIES) {
        if (!c.keywords?.some(k => lower.includes(k))) continue;

        if (c.options?.length) {
          for (const opt of c.options) {
            if (opt.keywords?.some(k => lower.includes(k))) {
              return { country: c, tz: opt.tz, labelKR: opt.labelKR, labelEN: opt.labelEN, usedOption: true, multi: c.options.length > 1 };
            }
          }
        }

        return { country: c, tz: c.primaryTZ, labelKR: null, labelEN: null, usedOption: false, multi: c.options?.length > 1 };
      }

      return { country: kr, tz: kr.primaryTZ, labelKR: null, labelEN: null, usedOption: false, multi: false, fallback: true };
    }

    function buildMultiZoneHintKR(country) {
      if (!country || country.code !== "US") return "";
      return "참고: 미국은 여러 시간대(동부/중부/산악/태평양)가 있어요. (예: '미국 캘리포니아', '미국 뉴욕'처럼 말하면 더 정확)";
    }
    function buildMultiZoneHintEN(country) {
      if (!country || country.code !== "US") return "";
      return "Note: The U.S. has multiple time zones (ET/CT/MT/PT). Say a region like 'California' or 'New York' for a precise answer.";
    }

    function buildTimeAnswerIfAsked(userText) {
      if (!isTimeQuestion(userText)) return null;

      const target = detectTimeTarget(userText);
      const t = getTimePartsInTZ(target.tz);

      const english = isEnglishText(userText);
      const countryName = english ? target.country.nameEN : target.country.nameKR;
      const optLabel = english ? target.labelEN : target.labelKR;

      // ✅ 한국은 전국 동일 시간대(Asia/Seoul)이므로, 도시/권역명이 있으면 라벨에만 반영
      let krPlaceLabel = null;
      if (!english && target.country?.code === "KR") {
        const loc = detectLocationFromText(userText);
        if (loc && loc.matchedBy && loc.matchedBy !== "default") {
          krPlaceLabel = String(loc.displayName || loc.name || "").replace("(기본값)", "").trim();
        }
      }

      const needHint = target.multi && !target.usedOption;

      if (english) {
        const prefix = optLabel ? `${countryName} (${optLabel})` : `${countryName}`;
        const hint = needHint ? `
${buildMultiZoneHintEN(target.country)}` : "";
        return pickOne([
          `${prefix} time is ${t.timeStr} on ${t.weekdayEN}, ${t.dateStr}.${hint}`,
          `Current time in ${prefix} is ${t.timeStr} (${t.weekdayEN}, ${t.dateStr}).${hint}`,
          `It is ${t.timeStr} in ${prefix} right now (${t.weekdayEN}, ${t.dateStr}).${hint}`
        ]);
      } else {
        // ✅ "청주 시간" → "대한민국 청주 시간은 ...", "시간"만 → "대한민국 시간은 ..."
        const prefix = krPlaceLabel
          ? `${countryName} ${krPlaceLabel}`
          : (optLabel ? `${countryName} ${optLabel}` : `${countryName}`);

        const hint = needHint ? `
${buildMultiZoneHintKR(target.country)}` : "";
        return pickOne([
          `${prefix} 시간은 ${t.dateStr} ${t.weekdayKR} ${t.timeStr} 입니다.${hint}`,
          `현재 ${prefix} 시간은 ${t.dateStr} ${t.weekdayKR} ${t.timeStr} 입니다.${hint}`,
          `지금 ${prefix} 시간은 ${t.dateStr} ${t.weekdayKR} ${t.timeStr} 입니다.${hint}`
        ]);
      }
    }


    // ---------------- FX (AI 제외) ----------------
    // ✅ "원" 단독 키워드는 지역명(강원/원주 등)과 충돌하므로 사용하지 않음
    const FX_QUESTION_KEYWORDS = [
      "환율", "exchange rate", "exchangerate", "fx",
      "달러", "엔", "위안", "유로",
      "usd", "jpy", "cny", "eur", "krw",
      "원달러", "달러원", "usdkrw", "jpykrw", "cnykrw", "eurkrw"
    ];

    function isFxQuestion(text) {
      const s = (text || "");
      const lower = s.toLowerCase();

      // 1) 명시적으로 "환율"을 물으면 무조건 FX
      if (lower.includes("환율") || lower.includes("exchange rate") || lower.includes("fx")) return true;

      // 2) 통화 단어/코드가 포함된 경우만 FX
      const hasCurrencyWord = /(달러|엔|일본|위안|유로|중국)/.test(s);
      const hasCurrencyCode = /\b(usd|jpy|cny|eur|krw)\b/i.test(s);
      const hasPairCompact = /(usdkrw|jpykrw|cnykrw|eurkrw)/i.test(s);

      return hasCurrencyWord || hasCurrencyCode || hasPairCompact;
    }

    function detectFxPair(text) {
      const s = (text || "");
      const lower = s.toLowerCase();

      // 기본: USD/KRW
      let base = "USD", quote = "KRW";

      // 명시 페어(usd/krw, usdkrw 등)
      const m1 = lower.match(/\b(usd|jpy|cny|eur)\s*[/\-]?\s*(krw)\b/);
      if (m1) { base = m1[1].toUpperCase(); quote = m1[2].toUpperCase(); return { base, quote }; }

      const m2 = lower.match(/\b(krw)\s*[/\-]?\s*(usd|jpy|cny|eur)\b/);
      if (m2) { base = m2[2].toUpperCase(); quote = m2[1].toUpperCase(); return { base, quote }; }

      // 단어 기반
      if (/(엔|엔화|jpy|일본)/i.test(s)) base = "JPY";
      if (/(위안|cny|중국)/i.test(s)) base = "CNY";
      if (/(유로|eur)/i.test(s)) base = "EUR";
      if (/(달러|usd)/i.test(s)) base = "USD";

      // "원달러" 같은 표현은 USD/KRW 의미
      // quote는 KRW 고정(우리 서비스 기준)
      return { base, quote };
    }

    function formatFxLabelKR(base, quote) {
      const map = { USD: "달러", JPY: "엔", CNY: "위안", EUR: "유로", KRW: "원" };
      const b = map[base] || base;
      const q = map[quote] || quote;
      return `${b}/${q}`;
    }

    // ✅ 공통: 여러 URL 중 첫 성공 JSON 가져오기
    async function fetchFirstOkJson(urls, fetchOpts) {
      let lastErr = null;
      for (const url of (urls || [])) {
        try {
          const res = await fetch(url, fetchOpts || undefined);
          if (!res.ok) throw new Error(`http ${res.status}: ${url}`);
          return await res.json();
        } catch (e) {
          lastErr = e;
        }
      }
      throw lastErr || new Error("fetch failed");
    }

    function extractFxRate(json, base, quote) {
      if (!json) return null;

      // 1) { rate: 1333.1 } / { value: 1333.1 }
      const direct = safeNum(json.rate ?? json.value ?? json.fx_rate ?? json.exrate);
      if (direct !== null) return direct;

      // 2) { base:"USD", quote:"KRW", rate:... }
      if ((json.base || "").toUpperCase() === base && (json.quote || "").toUpperCase() === quote) {
        const r = safeNum(json.rate ?? json.value);
        if (r !== null) return r;
      }

      // 3) { rates: { KRW: 1333.1 } }
      if (json.rates && typeof json.rates === "object") {
        const r = safeNum(json.rates[quote] ?? json.rates[quote.toLowerCase()]);
        if (r !== null) return r;
      }

      // 4) { data: { rate: ... } }
      if (json.data && typeof json.data === "object") {
        const r = safeNum(json.data.rate ?? json.data.value);
        if (r !== null) return r;
        if (json.data.rates && typeof json.data.rates === "object") {
          const r2 = safeNum(json.data.rates[quote] ?? json.data.rates[quote.toLowerCase()]);
          if (r2 !== null) return r2;
        }
      }

      return null;
    }

    async function buildFxAnswerIfAsked(userText) {
      if (!isFxQuestion(userText)) return null;

      const english = isEnglishText(userText);
      const { base, quote } = detectFxPair(userText);

      // ✅ 외부 무료 환율 API를 브라우저에서 직접 호출 (인증키 없이)
      // 1) Frankfurter (api.frankfurter.dev) : 최신 환율, No API keys
      // 2) ExchangeRate-API Open Access (open.er-api.com) : No API key (일 1회 갱신)
      const candidates = [
        `${WIDGETS.fxUrl}?base=${encodeURIComponent(base)}&symbols=${encodeURIComponent(quote)}`,
        `https://open.er-api.com/v6/latest/${encodeURIComponent(base)}`
      ];

      try {
        const raw = await fetchFirstOkJson(candidates);
        let rate = extractFxRate(raw, base, quote);

        // open.er-api.com 응답 호환 (rates[QUOTE])
        if (rate === null && raw && typeof raw === "object" && raw.rates) {
          rate = safeNum(raw.rates[quote]);
        }

        if (rate === null) {
          return english
            ? "Sorry, I couldn't parse the exchange rate response."
            : "죄송해요. 환율 응답을 해석하지 못했어요.";
        }

        const labelKR = formatFxLabelKR(base, quote);
        const labelEN = `${base}/${quote}`;
        const label = english ? labelEN : labelKR;

        const digits = (base === "JPY") ? 3 : 2;
        const rateStr = Number(rate).toFixed(digits);

        if (english) {
          return pickOne([
            `The exchange rate for ${label} is ${rateStr}.`,
            `Current ${label} rate is ${rateStr}.`,
            `${label} is around ${rateStr} right now.`
          ]);
        }
        return pickOne([
          `${label} 환율은 ${rateStr} 입니다.`,
          `현재 ${label} 기준 환율은 ${rateStr} 입니다.`,
          `지금 ${label}는 ${rateStr} 수준입니다.`
        ]);
      } catch (e) {
        console.error("FX Fail:", e);
        return english
          ? "Sorry, I couldn't fetch the exchange rate right now."
          : "죄송해요. 지금은 환율 정보를 불러오지 못했어요.";
      }
    }

    // ---------------- WEATHER (AI 제외) ----------------
    const WEATHER_QUESTION_KEYWORDS = [
      "날씨", "기온", "습도", "비", "강수", "눈", "우산", "강수확률",
      "weather", "temperature", "rain", "snow", "humidity", "forecast", "precip"
    ];

    function isWeatherQuestion(text) {
      const lower = (text || "").toLowerCase();
      return WEATHER_QUESTION_KEYWORDS.some(k => lower.includes(k));
    }

    function normalizeUltra(raw) {
      if (!raw || typeof raw !== "object") return null;
      const temp = safeNum(raw.temperature_c ?? raw.temp_c ?? raw.temp ?? raw.t1h);
      const hum = safeNum(raw.humidity_pct ?? raw.hum_pct ?? raw.reh);
      const rain = safeNum(raw.rain_1h_mm ?? raw.rn1 ?? raw.rain);
      return { temp, hum, rain };
    }

    function extractPop(raw) {
      if (!raw || typeof raw !== "object") return null;
      const h0 = raw?.hourly?.[0];
      let pop = safeNum(h0?.POP ?? h0?.pop ?? raw?.POP ?? raw?.pop);

      if (pop === null && Array.isArray(raw?.items)) {
        const it = raw.items.find(x => (x.category || "").toUpperCase() === "POP");
        pop = safeNum(it?.fcstValue ?? it?.value);
      }
      if (pop === null && Array.isArray(raw)) {
        pop = safeNum(raw?.[0]?.POP ?? raw?.[0]?.pop);
      }
      return pop;
    }


    // ✅ 자연어 날짜(내일/모레/토요일 등) 파싱 → 단기/중기 자동 선택용
    function addDays(d, n) {
      const x = new Date(d);
      x.setDate(x.getDate() + n);
      return x;
    }
    function yyyymmdd(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const da = String(d.getDate()).padStart(2, "0");
      return `${y}${m}${da}`;
    }
    function daysFromToday(target, now = new Date()) {
      const a = new Date(target.getFullYear(), target.getMonth(), target.getDate());
      const b = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      return Math.round((a - b) / (24 * 60 * 60 * 1000));
    }
    function getTargetDateFromQuestion(q, now = new Date()) {
      const t = (q || "").toLowerCase();

      if (/(오늘|지금|현재)/.test(t)) return { date: new Date(now), labelKR: "오늘", labelEN: "today" };
      if (/내일/.test(t)) return { date: addDays(now, 1), labelKR: "내일", labelEN: "tomorrow" };
      if (/모레/.test(t)) return { date: addDays(now, 2), labelKR: "모레", labelEN: "the day after tomorrow" };
      if (/글피/.test(t)) return { date: addDays(now, 3), labelKR: "글피", labelEN: "in 3 days" };

      const dowMap = {
        "일": 0, "일요일": 0,
        "월": 1, "월요일": 1,
        "화": 2, "화요일": 2,
        "수": 3, "수요일": 3,
        "목": 4, "목요일": 4,
        "금": 5, "금요일": 5,
        "토": 6, "토요일": 6,
      };
      const m = t.match(/(이번주|다음주)?\s*(일요일|월요일|화요일|수요일|목요일|금요일|토요일|일|월|화|수|목|금|토)/);
      if (m) {
        const weekWord = m[1] || "이번주";
        const dowWord = m[2];
        const targetDow = dowMap[dowWord];
        if (targetDow != null) {
          const baseDow = now.getDay();
          let delta = (targetDow - baseDow + 7) % 7;
          if (delta === 0) delta = 7; // 같은 요일이면 다음주로
          if (weekWord === "다음주") delta += 7;
          const d = addDays(now, delta);
          return { date: d, labelKR: `${weekWord} ${dowWord}`.trim(), labelEN: `${weekWord === "다음주" ? "next" : "this"} ${dowWord}` };
        }
      }
      return null;
    }

    function pickBestForecastItem(items, targetDateStr) {
      if (!Array.isArray(items) || !items.length) return null;
      const filtered = items.filter(it => String(it.fcstDate || it.date || "") === targetDateStr);
      const pool = filtered.length ? filtered : items;
      // 12시 근처(1200, 1500, 0900 우선)
      const preferred = ["1200", "1500", "0900", "1800", "0600", "0000"];
      for (const pt of preferred) {
        const hit = pool.find(it => String(it.fcstTime || it.time || "") === pt);
        if (hit) return hit;
      }
      return pool[0];
    }

    // 단기예보 JSON → 특정 날짜의 TMP/POP/REH/SKY 요약
    function summarizeShortForDate(raw, targetDate) {
      if (!raw || typeof raw !== "object") return null;
      const target = yyyymmdd(targetDate);

      // 1) KMA 스타일: items = [{fcstDate, fcstTime, category, fcstValue}, ...]
      if (Array.isArray(raw.items)) {
        const byTime = {};
        for (const it of raw.items) {
          if (String(it.fcstDate) !== target) continue;
          const time = String(it.fcstTime || "");
          if (!byTime[time]) byTime[time] = {};
          const cat = String(it.category || "").toUpperCase();
          byTime[time][cat] = it.fcstValue ?? it.value;
        }
        const times = Object.keys(byTime);
        if (!times.length) return null;

        // 12시 근처 선택
        const preferred = ["1200", "1500", "0900", "1800", "0600", "0000"];
        let bestTime = times[0];
        for (const pt of preferred) {
          if (byTime[pt]) { bestTime = pt; break; }
        }
        const slot = byTime[bestTime] || {};
        const temp = safeNum(slot.TMP ?? slot.T3H ?? slot.T1H);
        const hum = safeNum(slot.REH);
        const pop = safeNum(slot.POP);
        const sky = safeNum(slot.SKY);
        const pty = safeNum(slot.PTY);
        return { when: bestTime, temp, hum, pop, sky, pty };
      }

      // 2) hourly 배열 형태: [{date:"YYYYMMDD", time:"HHMM", POP:.., TMP:..}, ...]
      if (Array.isArray(raw.hourly)) {
        const normalized = raw.hourly.map(h => ({
          fcstDate: String(h.fcstDate ?? h.date ?? ""),
          fcstTime: String(h.fcstTime ?? h.time ?? ""),
          TMP: h.TMP ?? h.tmp ?? h.temp ?? h.temperature,
          POP: h.POP ?? h.pop,
          REH: h.REH ?? h.reh ?? h.humidity,
          SKY: h.SKY ?? h.sky,
          PTY: h.PTY ?? h.pty
        }));
        const best = pickBestForecastItem(normalized, target);
        if (!best) return null;
        return {
          when: best.fcstTime,
          temp: safeNum(best.TMP),
          hum: safeNum(best.REH),
          pop: safeNum(best.POP),
          sky: safeNum(best.SKY),
          pty: safeNum(best.PTY),
        };
      }

      return null;
    }

    function skyTextKR(sky, pty) {
      // PTY(강수형태) 우선
      const p = safeNum(pty);
      if (p === 1) return "비";
      if (p === 2) return "비/눈";
      if (p === 3) return "눈";
      if (p === 4) return "소나기";
      const s = safeNum(sky);
      if (s === 1) return "맑음";
      if (s === 3) return "구름많음";
      if (s === 4) return "흐림";
      return null;
    }

    // 중기예보(육상/기온) 응답에서 D+N(3~10) 값 뽑기
    function summarizeMidForDay(midLand, midTemp, dayN) {
      // dayN: 3~10
      const n = Math.min(10, Math.max(3, dayN));
      const suf = String(n);
      const wfAm = midLand?.[`wf${suf}Am`] ?? midLand?.[`wf${suf}am`] ?? midLand?.[`wf${suf}AM`];
      const wfPm = midLand?.[`wf${suf}Pm`] ?? midLand?.[`wf${suf}pm`] ?? midLand?.[`wf${suf}PM`];
      const rnAm = safeNum(midLand?.[`rnSt${suf}Am`] ?? midLand?.[`rnSt${suf}am`]);
      const rnPm = safeNum(midLand?.[`rnSt${suf}Pm`] ?? midLand?.[`rnSt${suf}pm`]);
      const taMin = safeNum(midTemp?.[`taMin${suf}`] ?? midTemp?.[`tamin${suf}`]);
      const taMax = safeNum(midTemp?.[`taMax${suf}`] ?? midTemp?.[`tamax${suf}`]);
      const wf = wfAm || wfPm || midLand?.[`wf${suf}`] || null;

      // 어떤 키도 없으면 null
      if (wf == null && rnAm == null && rnPm == null && taMin == null && taMax == null) return null;

      return { wfAm, wfPm, wf, rnAm, rnPm, taMin, taMax };
    }

    async function buildWeatherAnswerIfAsked(userText) {
      if (!isWeatherQuestion(userText)) return null;
      const lower = (userText || "").toLowerCase();


      // ✅ 날씨/기상 '정보 조회'가 아니라 코디/활동/추천류 질문이면 AI로 넘깁니다
      const RECO_HINTS = ["추천", "코디", "옷", "옷차림", "룩", "플레이리스트", "음악", "활동", "가이드", "일정", "뭐할까", "맛집", "데이트"];
      if (RECO_HINTS.some(k => lower.includes(k))) return null;
      // ✅ 한국(대한민국) 이외 지역 날씨 요청은 차단
      const FOREIGN_WEATHER_KEYWORDS = [
        "tokyo", "osaka", "kyoto", "nagoya", "sapporo", "fukuoka", "japan", "jp",
        "beijing", "shanghai", "guangzhou", "shenzhen", "china", "cn",
        "hong kong", "hk", "taipei", "taiwan", "tw",
        "new york", "los angeles", "san francisco", "seattle", "usa", "us", "united states",
        "london", "manchester", "uk", "united kingdom", "england",
        "paris", "france", "berlin", "germany", "rome", "italy", "madrid", "spain",
        "bangkok", "thailand", "singapore", "sg", "hanoi", "vietnam", "manila", "philippines",
        "sydney", "melbourne", "australia", "au",
        "도쿄", "오사카", "일본", "중국", "베이징", "상하이", "미국", "영국", "런던", "프랑스", "파리", "독일", "베를린",
        "태국", "방콕", "싱가포르", "베트남", "하노이", "필리핀", "마닐라", "호주", "시드니"
      ];
      if (FOREIGN_WEATHER_KEYWORDS.some(k => lower.includes(k))) {
        return "현재는 대한민국 지역 날씨만 지원합니다.";
      }

      let loc = detectLocationFromText(userText);

      // ✅ 지역 언급이 없거나 매칭 실패면 서울로 고정 (GPS 없음)
      if (!loc || loc.matchedBy === "default") {
        loc = { name: "서울", nx: 60, ny: 127, displayName: "서울", matchedBy: "fallback-seoul" };
      }

      const { nx, ny } = loc;

      const ultraCandidates = [
        `${API_BASE}/api/weather/weather/ultra?nx=${nx}&ny=${ny}`,
        `${API_BASE}/api/weather/ultra?nx=${nx}&ny=${ny}`,
        `${API_BASE}${WIDGETS.weatherUrl}?nx=${nx}&ny=${ny}`,
      ];

      const shortCandidates = [
        `${API_BASE}/api/weather/weather/short?nx=${nx}&ny=${ny}`,
        `${API_BASE}/api/weather/short?nx=${nx}&ny=${ny}`,
        `${API_BASE}${WIDGETS.forecastUrl}?nx=${nx}&ny=${ny}`,
      ];

      const english = isEnglishText(userText);
      const wantsPop = /강수확률|확률|비 올|rain|precip|pop/i.test(userText || "");

      // ✅ 내일/모레/토요일 등 '미래 날짜' 질의면 단기/중기 예보를 우선 사용
      const dateInfo = getTargetDateFromQuestion(userText, new Date());
      if (dateInfo) {
        const dday = daysFromToday(dateInfo.date, new Date());

        // --- D+1~3 : 단기예보(short)에서 날짜별 요약 ---
        if (dday >= 1 && dday <= 3) {
          try {
            const shortRawAll = await fetchFirstOkJson(shortCandidates);
            const s = summarizeShortForDate(shortRawAll, dateInfo.date);
            if (s) {
              const partsKR2 = [];
              const partsEN2 = [];
              const skyKR = skyTextKR(s.sky, s.pty);

              if (s.temp !== null) { partsKR2.push(`기온 ${Number(s.temp).toFixed(1)}℃`); partsEN2.push(`Temp ${Number(s.temp).toFixed(1)}°C`); }
              if (s.hum !== null) { partsKR2.push(`습도 ${Number(s.hum).toFixed(0)}%`); partsEN2.push(`Humidity ${Number(s.hum).toFixed(0)}%`); }
              if (s.pop !== null) { partsKR2.push(`강수확률 ${Number(s.pop).toFixed(0)}%`); partsEN2.push(`POP ${Number(s.pop).toFixed(0)}%`); }
              if (skyKR) { partsKR2.push(`${skyKR}`); }

              const enParts2 = partsEN2.join(", ");
              const krParts2 = partsKR2.join(", ");

              if (english) {
                return `${(loc.displayName || loc.name)} ${dateInfo.labelEN} forecast: ${enParts2}.`;
              }
              return `${loc.name} ${dateInfo.labelKR} 날씨: ${krParts2} 입니다.`;
            }
          } catch (e) {
            // 단기 파싱 실패 시 아래 ultra로 fallback
          }
        }

        // --- D+4 이상 : 중기(육상+기온) 시도 ---
        if (dday >= 4) {
          const midLandCandidates = [
            `${API_BASE}/api/weather/weather/mid-land`,
            `${API_BASE}/api/weather/mid-land`,
            `${API_BASE}/api/weather/mid/land`,
          ];
          const midTempCandidates = [
            `${API_BASE}/api/weather/weather/mid-temp`,
            `${API_BASE}/api/weather/mid-temp`,
            `${API_BASE}/api/weather/mid/temp`,
          ];

          try {
            const [midLandRaw, midTempRaw] = await Promise.all([
              fetchFirstOkJson(midLandCandidates),
              fetchFirstOkJson(midTempCandidates),
            ]);

            // 일부 구현은 {data:{...}} / {item:{...}} 형태일 수 있어 1단계 풀기
            const midLand = midLandRaw?.data ?? midLandRaw?.item ?? midLandRaw;
            const midTemp = midTempRaw?.data ?? midTempRaw?.item ?? midTempRaw;

            const dayN = Math.min(10, dday); // 4~10
            const msum = summarizeMidForDay(midLand, midTemp, dayN);
            if (msum) {
              const partsKR3 = [];
              const partsEN3 = [];

              // 기온
              if (msum.taMin !== null && msum.taMax !== null) {
                partsKR3.push(`기온 ${msum.taMin}~${msum.taMax}℃`);
                partsEN3.push(`Temp ${msum.taMin}~${msum.taMax}°C`);
              } else if (msum.taMax !== null) {
                partsKR3.push(`기온 ${msum.taMax}℃`);
                partsEN3.push(`Temp ${msum.taMax}°C`);
              }

              // 육상(오전/오후)
              const wfKR = msum.wfAm || msum.wfPm || msum.wf;
              if (wfKR) {
                if (msum.wfAm && msum.wfPm) {
                  partsKR3.push(`오전 ${msum.wfAm} / 오후 ${msum.wfPm}`);
                } else {
                  partsKR3.push(String(wfKR));
                }
                // EN은 간단히 동일 텍스트(한국어 유지 가능) 대신 라벨만 영어로
                partsEN3.push(`Sky ${String(wfKR)}`);
              }

              // 강수확률
              if (msum.rnAm !== null || msum.rnPm !== null) {
                const am = (msum.rnAm !== null) ? `${msum.rnAm}%` : "—";
                const pm = (msum.rnPm !== null) ? `${msum.rnPm}%` : "—";
                partsKR3.push(`강수확률(오전/오후) ${am}/${pm}`);
                partsEN3.push(`POP(AM/PM) ${am}/${pm}`);
              }

              const krParts3 = partsKR3.join(", ");
              const enParts3 = partsEN3.join(", ");

              if (english) {
                return `${(loc.displayName || loc.name)} ${dateInfo.labelEN} outlook: ${enParts3}.`;
              }
              return `${loc.name} ${dateInfo.labelKR} 날씨: ${krParts3} 입니다.`;
            }
          } catch (e) {
            // 중기 실패 시 ultra fallback
          }
        }
      }

      const ultraRaw = await fetchFirstOkJson(ultraCandidates);
      const ultra = normalizeUltra(ultraRaw);
      if (!ultra) {
        return english
          ? "Sorry, I couldn't fetch the weather right now."
          : "죄송해요. 지금은 날씨 정보를 불러오지 못했어요.";
      }

      let pop = null;
      if (wantsPop) {
        const shortRaw = await fetchFirstOkJson(shortCandidates);
        pop = extractPop(shortRaw);
      }

      const partsKR = [];
      const partsEN = [];
      if (ultra.temp !== null) { partsKR.push(`기온 ${Number(ultra.temp).toFixed(1)}℃`); partsEN.push(`Temp ${Number(ultra.temp).toFixed(1)}°C`); }
      if (ultra.hum !== null) { partsKR.push(`습도 ${Number(ultra.hum).toFixed(0)}%`); partsEN.push(`Humidity ${Number(ultra.hum).toFixed(0)}%`); }
      if (ultra.rain !== null) { partsKR.push(`1시간 강수 ${Number(ultra.rain).toFixed(1)}mm`); partsEN.push(`Rain(1h) ${Number(ultra.rain).toFixed(1)}mm`); }
      if (pop !== null) { partsKR.push(`강수확률 ${Number(pop).toFixed(0)}%`); partsEN.push(`POP ${Number(pop).toFixed(0)}%`); }

      const enParts = partsEN.join(", ");
      const krParts = partsKR.join(", ");

      if (english) {
        return pickOne([
          `${(loc.displayName || loc.name)} weather: ${enParts}.`,
          `Current ${(loc.displayName || loc.name)}: ${enParts}.`,
          `Weather in ${(loc.displayName || loc.name)}: ${enParts}.`
        ]);
      }
      return pickOne([
        `${loc.name} 날씨: ${krParts} 입니다.`,
        `현재 ${loc.name} 기준 ${krParts} 입니다.`,
        `지금 ${loc.name}의 기상 정보는 ${krParts} 입니다.`
      ]);
    }

    // ================================
    // ✅ Local Answer UX Helpers
    // - Make local (TIME/FX/WEATHER) answers feel like AI responses
    // - Show "Thinking..." for 10~15s before replying
    // - Choose 1 of 3 response phrasings (KR/EN only)
    // ================================
    function pickOne(arr) {
      if (!arr || !arr.length) return "";
      return arr[Math.floor(Math.random() * arr.length)];
    }
    function sleep(ms) { return new Promise(res => setTimeout(res, ms)); }
    async function localThinkingDelay(kind = "GEN") {
      // ✅ Local 답변(시간/환율/날씨)도 '생각 중' 연출은 유지하되, 기존의 절반 수준으로 단축
      // - GEN: 5~8s
      // - TIME: 5~6s
      // - FX: 6~7s
      // - WEATHER: 6~8s
      let min = 5000, max = 8000;
      if (kind === "TIME") { min = 5000; max = 6000; }
      else if (kind === "FX") { min = 6000; max = 7000; }
      else if (kind === "WEATHER") { min = 6000; max = 8000; }
      const ms = min + Math.floor(Math.random() * (max - min + 1));
      await sleep(ms);
    }

    function startThinkingAnimation(loadingId) {
      // ✅ AI-like typing indicator: Thinking. → Thinking.. → Thinking...
      let dots = 1;
      const tick = () => {
        const msg = "Thinking" + ".".repeat(dots);
        setChatBubbleById(loadingId, msg, false);
        dots = (dots % 3) + 1;
      };
      tick();
      const timer = setInterval(tick, 600);
      return () => clearInterval(timer);
    }

    // --- helper: find earliest keyword position (for ordering multi-intent answers)
    function getFirstIndex(haystack, needles) {
      if (!haystack) return -1;
      let best = -1;
      for (const n of (needles || [])) {
        if (!n) continue;
        const i = haystack.indexOf(String(n).toLowerCase());
        if (i !== -1 && (best === -1 || i < best)) best = i;
      }
      return best;
    }

    async function sendQuestion() {
      // 중복 전송 방지
      if (window.__aiInFlight) return;

      const inp = document.getElementById("questionInput");
      const sendBtn = document.getElementById("sendButton");

      const q = (inp?.value || "").trim();
      if (!q) return;

      openChatUI();

      // UI 잠금
      window.__aiInFlight = true;
      try { if (sendBtn) sendBtn.disabled = true; } catch (_) { }
      // ✅ 입력창은 계속 타이핑 가능(전송만 잠금)
      // try{ if (inp) inp.disabled = true; } catch(_){}

      // 이전 요청 취소 후 새 요청 생성
      try {
        if (window.__aiAbortController) window.__aiAbortController.abort();
      } catch (_) { }
      window.__aiAbortController = new AbortController();

      appendChat("user", q);
      inp.value = "";
      chatMessages.push({ role: "user", content: q });

      const loadingId = "loading-" + Date.now();
      appendChat("assistant", "Thinking...", { id: loadingId });
      const stopThinking = startThinkingAnimation(loadingId);

      try {
        // ✅ 멀티 인텐트 처리: TIME / FX / WEATHER 를 동시에 감지해서 한 번에 응답
        const lowerQ = q.toLowerCase();

        // "X 말고" 형태는 해당 인텐트를 제외(예: "환율 말고 수원 날씨")
        const excludeFX = /(?:환율|fx|exchange rate).{0,12}말고/.test(q) || /말고.{0,12}(?:환율|fx|exchange rate)/.test(q);
        const excludeTIME = /(?:시간|time).{0,12}말고/.test(q) || /말고.{0,12}(?:시간|time)/.test(q);
        const excludeWEATHER = /(?:날씨|weather|기온|습도|강수).{0,12}말고/.test(q) || /말고.{0,12}(?:날씨|weather|기온|습도|강수)/.test(q);

        // 각 인텐트별 응답 생성(가능한 것만)
        const parts = [];

        // TIME
        let timeAns = null;
        if (!excludeTIME) {
          timeAns = buildTimeAnswerIfAsked(q);
          if (timeAns) parts.push({ kind: "TIME", pos: getFirstIndex(lowerQ, ["시간", "time"]), text: timeAns });
        }

        // FX
        let fxAns = null;
        if (!excludeFX) {
          fxAns = await buildFxAnswerIfAsked(q);
          if (fxAns) parts.push({ kind: "FX", pos: getFirstIndex(lowerQ, ["환율", "fx", "exchange rate", "달러", "usd", "엔", "jpy", "위안", "cny", "유로", "eur", "krw"]), text: fxAns });
        }

        // WEATHER
        let weatherAns = null;
        if (!excludeWEATHER) {
          weatherAns = await buildWeatherAnswerIfAsked(q);
          if (weatherAns) parts.push({ kind: "WEATHER", pos: getFirstIndex(lowerQ, ["날씨", "weather", "기온", "습도", "강수", "비", "temperature", "rain"]), text: weatherAns });
        }

        if (parts.length > 0) {
          // 질문에 나온 순서대로 정렬(키워드가 없으면 뒤로)
          parts.sort((a, b) => (a.pos === -1 ? 1 : a.pos) - (b.pos === -1 ? 1 : b.pos));

          // 멀티일 때는 한 번에 보여주기 (줄바꿈)
          const combined = parts.map(p => p.text).join("\n");

          // 딜레이는 가장 "무거운" 종류 기준으로
          const kindForDelay =
            parts.some(p => p.kind === "WEATHER") ? "WEATHER" :
              parts.some(p => p.kind === "FX") ? "FX" :
                parts.some(p => p.kind === "TIME") ? "TIME" : "GEN";

          await localThinkingDelay(kindForDelay);
          stopThinking();
          setChatBubbleById(loadingId, combined, false);
          chatMessages.push({ role: "assistant", content: combined });
          return;
        }

        // ✅ 그 외 질문만 AI (운영: 프록시 단일 경로)
        const { via, content, attempts } = await callAI(chatMessages, window.__aiAbortController.signal);

        stopThinking();
        setChatBubbleById(loadingId, content, false);
        chatMessages.push({ role: "assistant", content });
        console.log("AI answered via:", via, attempts || []);
        try { await updateRagChip(); } catch (e) { }
      } catch (e) {
        console.error("AI Error:", e);

        // attempts가 있으면 화면에 원인 힌트 표시
        let hint = "";
        try {
          const at = e?.attempts || [];
          if (Array.isArray(at) && at.length) {
            hint = "\n[진단] " + at.map(x => {
              if (x.status) return `${x.via}:${x.status}`;
              if (x.error) return `${x.via}:${x.error}`;
              return `${x.via}:fail`;
            }).join(" | ");
          }
        } catch (_) { }

        try { stopThinking(); } catch (_) { }
        setChatBubbleById(
          loadingId,
          "AI 호출 실패: " + (e?.message || String(e)) +
          hint +
          "\n(운영 권장: 브라우저 direct 호출은 끄고(/CORS), /api/ai 프록시 단일 경로로 고정)",
          true
        );
        try { await updateRagChip(); } catch (e) { }
      } finally {
        window.__aiInFlight = false;
        try { if (sendBtn) sendBtn.disabled = false; } catch (_) { }
        try { if (inp) inp.disabled = false; } catch (_) { }
      }
    }


    document.getElementById("sendButton").onclick = sendQuestion;
    document.getElementById("questionInput").addEventListener("keypress", (e) => {
      if (e.key === "Enter") sendQuestion();
    });

    document.querySelectorAll(".example-btn").forEach(btn => btn.onclick = () => {
      document.getElementById("questionInput").value = btn.getAttribute("data-question");
      sendQuestion();
    });

    document.getElementById("btnClearChatOuter").onclick = () => {
      if (!confirm("대화 내용을 모두 지우시겠습니까?")) return;
      document.getElementById("chatHistory").innerHTML = "";
      chatMessages = [];
      closeChatUI();
    };

    window.onload = () => {
      const auth = JSON.parse(sessionStorage.getItem(AUTH_KEY));
      if (auth) {
        document.getElementById("loginView").classList.add("hidden");
        document.getElementById("dashboardView").classList.remove("hidden");

        if (auth.role === "admin") {
          document.getElementById("toolbar").classList.remove("hidden");
          document.getElementById("tbUserChip").textContent = auth.user;
        } else {
          document.getElementById("guestHeader").classList.remove("hidden");
        }

        maybeShowHostHint();
        loadQuote();

        refreshWidgets();
        setInterval(refreshWidgets, 60000);
      }
    };
  </script>
</body>
