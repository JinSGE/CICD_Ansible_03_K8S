apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-chat-api
  namespace: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: auth-chat-api
  template:
    metadata:
      labels:
        app: auth-chat-api
    spec:
      imagePullSecrets:
      - name: harbor-secret
      containers:
        image: 10.2.2.40:5000/library/ai-rag:latest
        ports:
        - containerPort: 3000
        env:
        - name: OLLAMA_HOST_PRIMARY
          value: "http://139.150.91.194:11434"
        - name: OLLAMA_HOST_SECONDARY
          value: "http://10.2.2.40:11434"
        - name: DEFAULT_MODEL
          value: "llama3.1:70b"
        - name: KMA_API_URL
          value: "http://kma-api:8080/weather/short"
        - name: ENERGY_API_URL
          value: "http://energy-api:8000/kpx/now"
        envFrom:
        - secretRef:
            name: authchat-secret
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                - k8s-workernode6
        readinessProbe:
          httpGet:
            path: /docs
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /docs
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: auth-chat-api
  namespace: production
spec:
  selector:
    app: auth-chat-api
  ports:
  - name: http
    port: 80
    targetPort: 8000

