# ═══════════════════════════════════════════════════════════════════════════
# Antigravity Infrastructure - K8S Inventory (Cleaned - Only Active Hosts)
# ═══════════════════════════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────────────────────────
# PC2 - K8S Control Plane (Master Nodes)
# ───────────────────────────────────────────────────────────────────────────
[PC2]
K8S-ControlPlane1   ansible_host=10.2.2.2
K8S-ControlPlane2   ansible_host=10.2.2.3
K8S-ControlPlane3   ansible_host=10.2.2.4

# ───────────────────────────────────────────────────────────────────────────
# PC3 - K8S Worker Nodes Tier 1
# ───────────────────────────────────────────────────────────────────────────
[PC3]
K8S-WorkerNode1     ansible_host=10.2.2.5
K8S-WorkerNode2     ansible_host=10.2.2.6
K8S-WorkerNode3     ansible_host=10.2.2.7

# ───────────────────────────────────────────────────────────────────────────
# PC6 - K8S Worker Nodes Tier 2
# ───────────────────────────────────────────────────────────────────────────
[PC6]
K8S-WorkerNode4     ansible_host=10.2.2.8
K8S-WorkerNode5     ansible_host=10.2.2.9
K8S-WorkerNode6     ansible_host=10.2.2.10

# ───────────────────────────────────────────────────────────────────────────
# K8S Cluster Groups
# ───────────────────────────────────────────────────────────────────────────
[K8S_Control_Plane:children]
PC2

[K8S_Master:children]
K8S_Control_Plane

[K8S_Primary_Master]
K8S-ControlPlane1

[K8S_Secondary_Masters]
K8S-ControlPlane2
K8S-ControlPlane3

[K8S_Workers:children]
PC3
PC6

[K8S_Cluster:children]
K8S_Control_Plane
K8S_Workers

# ───────────────────────────────────────────────────────────────────────────
# VIP & Load Balancer Groups
# ───────────────────────────────────────────────────────────────────────────
# Ingress VIP: WN3 (Master), WN5 (Backup) - 10.2.1.2
[ingress_vip]
K8S-WorkerNode3
K8S-WorkerNode5

# API VIP: WN1 (Master), WN2 (Backup) - 10.2.2.101
[api_vip]
K8S-WorkerNode1
K8S-WorkerNode2

# Ingress Load Balancer: WN4, WN5, WN6
[ingress_lb]
K8S-WorkerNode4
K8S-WorkerNode5
K8S-WorkerNode6

# ───────────────────────────────────────────────────────────────────────────
# Common Settings
# ───────────────────────────────────────────────────────────────────────────
[all:vars]
ansible_user=ansible
ansible_become=true
ansible_ssh_private_key_file=~/.ssh/PC5-CICD-OPS
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'